ignore:
  - "**/*.Tests/**"
  - "**/*Tests*/**"
  - "**/bin/**"
  - "**/obj/**"
  - "**/*.g.cs"

parsers:
  cobertura:
    partials_as_hits: true

coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 0.1%
        if_ci_failed: error
    patch:
      default:
        target: 95%
        threshold: 0.1%
        if_ci_failed: error
